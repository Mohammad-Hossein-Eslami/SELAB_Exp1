<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CTF Knowledge Base</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <nav class="navbar">
                <div class="nav-logo">SECRET_LOG</div>
                <ul class="nav-menu">
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/components/writeups.html">Writeups</a></li>
                    <li><a href="/components/tools.html">Security Tools</a></li>
                    <li><a href="/components/contact.html">Contact Us</a></li>
                </ul>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <span class="light-icon">☀️</span>
                    <span class="dark-icon">🌙</span>
                </button>
            </nav>
        </header>
        <main id="main-content">
            <section class="page-header">
                <h1>Contact Us</h1>
                <p>Get in touch with the CTF team</p>
            </section>
            <div class="contact-container">
                <form class="contact-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
                <div class="contact-info">
                    <h3>Other Ways to Reach Us</h3>
                    <p>📧 team@ctf-archive.com</p>
                    <p>🐦 Twitter: @CTFArchive</p>
                    <p>💬 Discord: CTF Community Server</p>
                </div>
            </div>
        </main>
        <footer id="footer">
            <div class="footer-info">
                <p>&copy; 2026 CTF Archive | System Status: <span class="status-online">Online</span></p>
                <small>Designed for Software Engineering Lab</small>
            </div>
        </footer>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
